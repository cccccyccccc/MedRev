<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>管理员设置 - MedRev</title>
    <style>
        :root {
            --bg: #081120;
            --panel: rgba(9, 18, 36, 0.82);
            --line: rgba(141, 166, 204, 0.22);
            --text: #edf4ff;
            --muted: #96a8c6;
            --accent: #6ee7ff;
            --accent-2: #8b5cf6;
            --shadow: 0 18px 54px rgba(0, 0, 0, 0.42);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text);
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(110, 231, 255, 0.14), transparent 28%),
                radial-gradient(circle at top right, rgba(139, 92, 246, 0.18), transparent 25%),
                linear-gradient(160deg, #060b15 0%, #0b1324 44%, #101a31 100%);
        }

        .page-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1400;
            border-bottom: 1px solid rgba(141, 166, 204, 0.25);
            background: rgba(8, 17, 32, 0.92);
            backdrop-filter: blur(10px);
        }

        .page-nav-inner {
            width: min(980px, calc(100vw - 24px));
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
        }

        .nav-links {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .nav-link {
            padding: 8px 12px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, .04);
            color: var(--text);
            font-size: 13px;
            text-decoration: none;
        }

        .nav-link.active {
            border-color: rgba(110, 231, 255, 0.35);
            background: rgba(110, 231, 255, 0.14);
            color: #d8fbff;
        }

        .shell {
            width: min(980px, calc(100vw - 24px));
            margin: 0 auto;
            padding: 84px 0 28px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            padding: 18px 20px;
            border: 1px solid var(--line);
            border-radius: 18px;
            background: linear-gradient(180deg, rgba(13, 23, 43, 0.95), rgba(8, 17, 32, 0.9));
            box-shadow: var(--shadow);
            margin-bottom: 14px;
        }

        h1,
        h2,
        p {
            margin: 0;
        }

        .eyebrow {
            letter-spacing: .14em;
            text-transform: uppercase;
            color: var(--accent);
            font-size: 12px;
            margin-bottom: 6px;
        }

        .subtitle {
            color: var(--muted);
            margin-top: 8px;
            line-height: 1.5;
        }

        .pill-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .pill {
            padding: 8px 12px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: rgba(255, 255, 255, .04);
            color: var(--text);
            font-size: 13px;
            text-decoration: none;
        }

        .card {
            border: 1px solid var(--line);
            border-radius: 18px;
            background: linear-gradient(180deg, rgba(13, 23, 43, 0.92), rgba(8, 17, 32, 0.85));
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .card-head {
            padding: 16px 18px 0;
        }

        .card-title {
            font-size: 18px;
            margin-bottom: 4px;
        }

        .card-subtitle {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.5;
        }

        .card-body {
            padding: 16px 18px 18px;
            display: grid;
            gap: 12px;
        }

        .field label {
            display: block;
            color: var(--muted);
            font-size: 12px;
            margin-bottom: 8px;
        }

        input,
        select,
        button {
            width: 100%;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, .12);
            background: rgba(255, 255, 255, .04);
            color: var(--text);
            padding: 10px 12px;
            font: inherit;
            outline: none;
        }

        .path-picker {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            width: auto;
            min-width: 108px;
            cursor: pointer;
        }

        .btn.primary {
            background: linear-gradient(135deg, rgba(110, 231, 255, 0.22), rgba(139, 92, 246, 0.25));
        }

        .btn.ghost {
            background: rgba(255, 255, 255, .03);
        }

        .code-box {
            font-family: Consolas, "SFMono-Regular", Menlo, Monaco, monospace;
            font-size: 12px;
            line-height: 1.55;
            background: rgba(0, 0, 0, .28);
            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 12px;
            padding: 10px 12px;
            color: #dbeafe;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .list-item {
            padding: 10px 12px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, .08);
            background: rgba(255, 255, 255, .03);
            font-size: 13px;
            line-height: 1.5;
        }

        .modal-mask {
            position: fixed;
            inset: 0;
            background: rgba(3, 9, 18, 0.72);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1200;
            padding: 16px;
        }

        .modal-mask[hidden] {
            display: none !important;
        }

        .modal-card {
            width: min(900px, 95vw);
            max-height: min(80vh, 760px);
            border: 1px solid var(--line);
            border-radius: 16px;
            background: linear-gradient(180deg, rgba(13, 23, 43, 0.98), rgba(8, 17, 32, 0.96));
            box-shadow: var(--shadow);
            display: grid;
            grid-template-rows: auto auto 1fr auto;
            overflow: hidden;
        }

        .modal-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px 0;
        }

        .modal-path {
            margin: 8px 16px 0;
            padding: 10px 12px;
            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 12px;
            background: rgba(0, 0, 0, .22);
            color: #dbeafe;
            font-family: Consolas, "SFMono-Regular", Menlo, Monaco, monospace;
            font-size: 12px;
            word-break: break-all;
        }

        .modal-body {
            padding: 10px 16px 16px;
            overflow: auto;
        }

        .folder-list {
            display: grid;
            gap: 8px;
        }

        .folder-item {
            width: 100%;
            text-align: left;
            border-radius: 12px;
            padding: 10px 12px;
            border: 1px solid rgba(255, 255, 255, .1);
            background: rgba(255, 255, 255, .03);
            color: var(--text);
            cursor: pointer;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            padding: 12px 16px 16px;
            border-top: 1px solid rgba(255, 255, 255, .08);
        }

        @media (max-width: 760px) {
            .page-nav-inner {
                width: min(100vw - 18px, 100%);
                align-items: flex-start;
                flex-direction: column;
            }

            .shell {
                width: min(100vw - 18px, 100%);
                padding: 132px 0 18px;
            }

            .topbar {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <nav class="page-nav">
        <div class="page-nav-inner">
            <div class="nav-links">
                <a class="nav-link" href="/admin">主页</a>
                <a class="nav-link" href="/admin/results">结果页</a>
                <a class="nav-link active" href="/admin/settings">设置页</a>
                <a class="nav-link" href="/doctor">医生页</a>
            </div>
            <a class="nav-link" href="{{ url_for('logout') }}">登出</a>
        </div>
    </nav>

    <div class="shell">
        <header class="topbar">
            <div>
                <div class="eyebrow">MedRev Admin Settings</div>
                <h1>管理员设置</h1>
                <p class="subtitle">将配置项与轮次生成集中到设置页，主管理页只保留进度与任务分配。</p>
            </div>
            <div class="pill-row">
                <span class="pill">登录用户: {{ session.get('user', 'unknown') }}</span>
            </div>
        </header>

        <section class="card">
            <div class="card-head">
                <h2 class="card-title">当前配置</h2>
                <p class="card-subtitle">用于展示当前 run_id 与 data_root 等配置项。</p>
            </div>
            <div class="card-body">
                <div class="code-box" id="configBox">加载中...</div>
            </div>
        </section>

        <div style="height:12px"></div>

        <section class="card">
            <div class="card-head">
                <h2 class="card-title">生成新轮次</h2>
                <p class="card-subtitle">设置器官、模型版本、数据版本和真实数据根目录后生成任务。</p>
            </div>
            <div class="card-body">
                <div class="field">
                    <label>器官（可多选）</label>
                    <div class="organ-checkbox-group" style="display:flex;flex-wrap:wrap;gap:10px;padding:4px 0;">
                        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;color:var(--text);font-size:14px;">
                            <input type="checkbox" value="肾脏" class="organ-check" checked style="accent-color:#6ee7ff;"> 肾脏
                        </label>
                        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;color:var(--text);font-size:14px;">
                            <input type="checkbox" value="肝脏" class="organ-check" style="accent-color:#6ee7ff;"> 肝脏
                        </label>
                        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;color:var(--text);font-size:14px;">
                            <input type="checkbox" value="胰腺" class="organ-check" style="accent-color:#6ee7ff;"> 胰腺
                        </label>
                    </div>
                </div>
                <div class="field">
                    <label>模型版本 (model_version)</label>
                    <input id="generateModelVersion" type="text" placeholder="e.g., v1.0, model_v3_20250106" />
                </div>
                <div class="field">
                    <label>数据版本 (data_version)</label>
                    <input id="generateDataVersion" type="text" placeholder="e.g., data_v1, 20250106" />
                </div>
                <div class="field">
                    <label>真实数据根目录 (data_root)</label>
                    <div class="path-picker">
                        <input id="generateDataRoot" type="text" placeholder="e.g., Test 或 D:/dataset" />
                        <button type="button" class="btn ghost" id="browseDataRootBtn">浏览...</button>
                    </div>
                </div>
                <div class="btn-row">
                    <button type="button" class="btn primary" id="generateRunBtn">生成新轮次</button>
                </div>
                <div id="generateStatus" class="list-item" hidden></div>
            </div>
        </section>
    </div>

    <div class="modal-mask" id="folderPickerModal" hidden>
        <div class="modal-card">
            <div class="modal-head">
                <div>
                    <h3>选择数据目录</h3>
                    <div style="color:#96a8c6;font-size:13px;">选择服务器本机真实数据目录作为 data_root</div>
                </div>
                <button type="button" class="btn ghost" id="folderPickerCloseBtn">关闭</button>
            </div>
            <div class="modal-path" id="folderPickerPath">-</div>
            <div class="modal-body">
                <div class="btn-row" style="margin-bottom:10px;">
                    <button type="button" class="btn ghost" id="folderPickerUpBtn">上级目录</button>
                    <button type="button" class="btn ghost" id="folderPickerRootsBtn">磁盘根目录</button>
                </div>
                <div class="folder-list" id="folderPickerList"></div>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn ghost" id="folderPickerCancelBtn">取消</button>
                <button type="button" class="btn primary" id="folderPickerSelectBtn">选择当前目录</button>
            </div>
        </div>
    </div>

    <script>
        const state = {
            summary: null,
            folderPicker: {
                currentPath: '',
                parent: null,
                roots: [],
                dirs: [],
            },
        }

        const el = (id) => document.getElementById(id)

        async function loadSummary() {
            const res = await fetch('/admin/summary')
            if (!res.ok) {
                el('configBox').textContent = '加载管理配置失败'
                return
            }
            state.summary = await res.json()
            el('configBox').textContent = JSON.stringify(state.summary.config || {}, null, 2)
            if (!el('generateDataRoot').value) {
                el('generateDataRoot').value = (state.summary.config || {}).data_root || 'Test'
            }
        }

        async function fetchFolderRoots() {
            const res = await fetch('/admin/fs/roots')
            if (!res.ok) throw new Error('获取磁盘根目录失败')
            const payload = await res.json()
            state.folderPicker.roots = payload.roots || []
        }

        async function fetchFolderList(path) {
            const query = path ? `?path=${encodeURIComponent(path)}` : ''
            const res = await fetch(`/admin/fs/list${query}`)
            if (!res.ok) {
                const payload = await res.json().catch(() => ({}))
                throw new Error(payload.error || '读取目录失败')
            }
            const payload = await res.json()
            state.folderPicker.currentPath = payload.path || ''
            state.folderPicker.parent = payload.parent || null
            state.folderPicker.dirs = payload.dirs || []
            renderFolderPickerList()
        }

        function renderFolderPickerList() {
            const list = el('folderPickerList')
            const pathLabel = el('folderPickerPath')
            pathLabel.textContent = state.folderPicker.currentPath || '请选择磁盘根目录'

            if (!state.folderPicker.currentPath) {
                const roots = state.folderPicker.roots || []
                list.innerHTML = roots.length
                    ? roots.map((root) => `<button type=\"button\" class=\"folder-item\" data-root=\"${root}\">📁 ${root}</button>`).join('')
                    : '<div class=\"list-item\">未发现可用根目录</div>'
                list.querySelectorAll('[data-root]').forEach((btn) => {
                    btn.addEventListener('click', async () => {
                        await fetchFolderList(btn.getAttribute('data-root'))
                    })
                })
                return
            }

            const dirs = state.folderPicker.dirs || []
            list.innerHTML = dirs.length
                ? dirs.map((d) => `<button type=\"button\" class=\"folder-item\" data-path=\"${d.path}\">📁 ${d.name}</button>`).join('')
                : '<div class=\"list-item\">当前目录无子文件夹</div>'
            list.querySelectorAll('[data-path]').forEach((btn) => {
                btn.addEventListener('click', async () => {
                    await fetchFolderList(btn.getAttribute('data-path'))
                })
            })
        }

        async function openFolderPicker() {
            el('folderPickerModal').hidden = false
            const currentInput = (el('generateDataRoot').value || '').trim()
            try {
                await fetchFolderRoots()
                if (currentInput) {
                    await fetchFolderList(currentInput)
                } else {
                    state.folderPicker.currentPath = ''
                    state.folderPicker.parent = null
                    state.folderPicker.dirs = []
                    renderFolderPickerList()
                }
            } catch (err) {
                el('folderPickerList').innerHTML = `<div class=\"list-item\">${err.message}</div>`
            }
        }

        function closeFolderPicker() {
            el('folderPickerModal').hidden = true
        }

        async function generateNewRun() {
            const organs = [...document.querySelectorAll('.organ-check:checked')].map(cb => cb.value)
            const modelVersion = el('generateModelVersion').value
            const dataVersion = el('generateDataVersion').value
            const dataRoot = el('generateDataRoot').value

            if (!organs.length) return alert('请至少选择一个器官')
            if (!modelVersion) return alert('请输入模型版本')
            if (!dataVersion) return alert('请输入数据版本')
            if (!dataRoot) return alert('请输入本地数据根目录')

            const statusEl = el('generateStatus')
            const btn = el('generateRunBtn')
            btn.disabled = true
            btn.textContent = '生成中...'
            statusEl.hidden = false
            statusEl.textContent = '正在生成新轮次...'

            try {
                const res = await fetch('/admin/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        organs,
                        model_version: modelVersion,
                        data_version: dataVersion,
                        data_root: dataRoot,
                    })
                })
                const payload = await res.json().catch(() => ({}))
                if (res.ok) {
                    statusEl.textContent = `生成成功：run_id=${payload.run_id || '-'}。可返回主界面查看任务池。`
                    await loadSummary()
                } else {
                    statusEl.textContent = `生成失败：${payload.error || payload.stderr || '未知错误'}`
                }
            } catch (err) {
                statusEl.textContent = `请求失败：${err.message}`
            } finally {
                btn.disabled = false
                btn.textContent = '生成新轮次'
            }
        }

        function bindEvents() {
            el('browseDataRootBtn').addEventListener('click', openFolderPicker)
            el('folderPickerCloseBtn').addEventListener('click', closeFolderPicker)
            el('folderPickerCancelBtn').addEventListener('click', closeFolderPicker)
            el('folderPickerRootsBtn').addEventListener('click', async () => {
                state.folderPicker.currentPath = ''
                state.folderPicker.parent = null
                state.folderPicker.dirs = []
                renderFolderPickerList()
            })
            el('folderPickerUpBtn').addEventListener('click', async () => {
                if (!state.folderPicker.currentPath || !state.folderPicker.parent) return
                await fetchFolderList(state.folderPicker.parent)
            })
            el('folderPickerSelectBtn').addEventListener('click', () => {
                if (!state.folderPicker.currentPath) {
                    alert('请先进入要选择的目录')
                    return
                }
                el('generateDataRoot').value = state.folderPicker.currentPath
                closeFolderPicker()
            })
            el('generateRunBtn').addEventListener('click', generateNewRun)
        }

        async function init() {
            bindEvents()
            await loadSummary()
        }

        init()
    </script>
</body>

</html>
